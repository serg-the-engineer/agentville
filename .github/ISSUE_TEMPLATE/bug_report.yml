name: Bug Report
description: Report a functional bug with reproducible steps
title: "[Bug]: "
labels:
  - "type:bug"
  - "status:triage"
body:
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "P0"
        - "P1"
        - "P2"
        - "P3"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-sentence problem statement
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction Steps
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Evidence
      description: Stack traces, events, screenshots, test failures
    validations:
      required: false

  - type: textarea
    id: failing_test
    attributes:
      label: Failing Test (TDD-first fix)
      description: Add/point to failing test that reproduces the bug
      placeholder: tests/test_*.py::test_...
    validations:
      required: false
